name: Code Quality tools

on:
    workflow_call: ~

permissions: read-all

jobs:
    code_quality:
        name: code-quality
        runs-on: ubuntu-latest
        env:
            CODE_QUALITY_CACHE_DIR: ${{ runner.temp }}/code-quality-cache
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  show-progress: false
                  persist-credentials: false

            - name: Setup PHP
              if: ${{ hashFiles('composer.json') != '' }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  extensions: dom, fileinfo, filter, gd, hash, intl, json, mbstring, mysqli, pcre, pdo_mysql, zlib
                  coverage: none

            -   name: Install Node.js
                if: ${{ hashFiles('package.json') != '' }}
                uses: actions/setup-node@v6
                with:
                    node-version: 24

            -   name: Enable core pack
                if: ${{ hashFiles('package.json') != '' }}
                run: corepack enable

            - name: Install Composer dependencies
              if: ${{ hashFiles('composer.json') != '' }}
              uses: ramsey/composer-install@v3

            - name: Install Node packages
              if: ${{ hashFiles('package.json') != '' }}
              run: npm install

            - name: Restore code quality caches
              id: code-quality-cache
              uses: actions/cache/restore@v5
              with:
                  path: ${{ env.CODE_QUALITY_CACHE_DIR }}
                  key: code-quality-${{ runner.os }}-${{ github.run_id }}
                  restore-keys: |
                      code-quality-${{ runner.os }}-

            - name: Run all code quality tools
              run: composer run code-quality

            - name: Save code quality caches
              if: ${{ !cancelled() }}
              uses: actions/cache/save@v5
              with:
                  path: ${{ env.CODE_QUALITY_CACHE_DIR }}
                  key: ${{ steps.code-quality-cache.outputs.cache-primary-key }}
